<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <rect width="600" height="800" fill="#2F1B1A"/>
  <!-- Shadow -->
  <ellipse cx="300" cy="570" rx="180" ry="8" fill="#FFFAEB" opacity="0.03"/>
  <!-- Gift box — open lid -->
  <path d="M140 350 L140 560 Q140 570 150 570 L450 570 Q460 570 460 560 L460 350 Z" fill="#3B0505" stroke="#FFFAEB" stroke-width="0.5" opacity="0.7"/>
  <!-- Box lid — angled open -->
  <path d="M140 350 L130 310 Q130 300 140 298 L460 298 Q470 300 470 310 L460 350" fill="#3B0505" stroke="#FFFAEB" stroke-width="0.5" opacity="0.6"/>
  <!-- Box ribbon/band -->
  <line x1="300" y1="298" x2="300" y2="570" stroke="#FFFAEB" stroke-width="0.3" opacity="0.12"/>
  <!-- Three bottles inside box -->
  <!-- Left bottle (Élevé) -->
  <rect x="180" y="280" width="50" height="120" rx="3" fill="#3B0505" stroke="#FFFAEB" stroke-width="0.4" opacity="0.8"/>
  <rect x="192" y="260" width="26" height="22" rx="1" fill="#3B0505" stroke="#FFFAEB" stroke-width="0.3" opacity="0.7"/>
  <rect x="189" y="240" width="32" height="22" rx="2" fill="#FFFAEB" opacity="0.08" stroke="#FFFAEB" stroke-width="0.3" opacity="0.4"/>
  <!-- Center bottle (Solène) -->
  <rect x="275" y="270" width="50" height="130" rx="3" fill="#FFFAEB" opacity="0.06" stroke="#FFFAEB" stroke-width="0.4" opacity="0.8"/>
  <rect x="287" y="250" width="26" height="22" rx="1" fill="none" stroke="#FFFAEB" stroke-width="0.3" opacity="0.7"/>
  <rect x="284" y="230" width="32" height="22" rx="2" fill="#FFFAEB" opacity="0.08" stroke="#FFFAEB" stroke-width="0.3" opacity="0.4"/>
  <!-- Right bottle (Fovère) -->
  <rect x="370" y="285" width="50" height="115" rx="3" fill="#2F1B1A" stroke="#FFFAEB" stroke-width="0.4" opacity="0.8"/>
  <rect x="382" y="265" width="26" height="22" rx="1" fill="#2F1B1A" stroke="#FFFAEB" stroke-width="0.3" opacity="0.7"/>
  <rect x="379" y="245" width="32" height="22" rx="2" fill="#FFFAEB" opacity="0.08" stroke="#FFFAEB" stroke-width="0.3" opacity="0.4"/>
  <!-- Text -->
  <text x="300" y="620" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="300" fill="#FFFAEB" opacity="0.5" letter-spacing="4">THE RITUAL COLLECTION</text>
  <text x="300" y="642" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="7" font-weight="300" fill="#FFFAEB" opacity="0.22" letter-spacing="2">3 × 100ML IN LUXURY PACKAGING</text>
  <!-- Brand mark -->
  <text x="300" y="690" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="9" font-weight="300" fill="#FFFAEB" opacity="0.12" letter-spacing="4">NORĒLLE</text>
</svg>
