<div id="results"></div>
<div class="log" id="logPanel"></div>

<script>
const BASE = () => document.getElementById('baseUrl').value.replace(/\/+$/, '');
let results = [];
let logLines = [];

function log(msg, type = 'info') {
  const ts = new Date().toLocaleTimeString();
  logLines.push({ ts, msg, type });
  const panel = document.getElementById('logPanel');
  panel.innerHTML += `<div class="${type}">[${ts}] ${msg}</div>`;
  panel.scrollTop = panel.scrollHeight;
}

function toggleLog() {
  document.getElementById('logPanel').classList.toggle('visible');
}

async function fetchPage(path) {
  const url = BASE() + path;
  log(`Fetching ${url}`);
  const start = performance.now();
  try {
    const resp = await fetch(url, { mode: 'cors', credentials: 'omit' });
    const html = await resp.text();
    const time = Math.round(performance.now() - start);
    log(`Got ${url} (${resp.status}, ${time}ms, ${html.length} chars)`, 'success');
    return { ok: resp.ok, status: resp.status, html, time, url };
  } catch (e) {
    const time = Math.round(performance.now() - start);
    log(`FAILED ${url}: ${e.message}`, 'error');
    return { ok: false, status: 0, html: '', time, url, error: e.message };
  }
}

function htmlHas(html, selector_or_text, isText = false) {
  if (isText) return html.includes(selector_or_text);
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  return doc.querySelector(selector_or_text) !== null;
}

function htmlCount(html, selector) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  return doc.querySelectorAll(selector).length;
}

function htmlText(html, selector) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const el = doc.querySelector(selector);
  return el ? el.textContent.trim() : '';
}

// ============================================================
// RUNNER
// ============================================================

async function runAllTests() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';
  results = [];
  logLines = [];
  document.getElementById('logPanel').innerHTML = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('progressFill').style.width = '0%';

  log('Starting Norelle test suite...', 'info');
  log(`Base URL: ${BASE()}`, 'info');

  let passed = 0, failed = 0, skipped = 0;

  for (let i = 0; i < tests.length; i++) {
    const t = tests[i];
    const pct = Math.round(((i + 1) / tests.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';

    try {
      const result = await t.run();
      results.push({ ...t, ...result });
      if (result.pass) passed++; else failed++;
      log(`${result.pass ? 'PASS' : 'FAIL'} — ${t.name}: ${result.detail}`, result.pass ? 'success' : 'error');
    } catch (e) {
      results.push({ ...t, pass: false, detail: `Error: ${e.message}` });
      failed++;
      log(`ERROR — ${t.name}: ${e.message}`, 'error');
    }

    updateCounts(passed, failed, skipped, tests.length);
    renderResults();
  }

  log(`Done! ${passed} passed, ${failed} failed, ${skipped} skipped out of ${tests.length}`, passed === tests.length ? 'success' : 'error');
  btn.disabled = false;
  btn.textContent = 'Run All Tests';
}

function updateCounts(p, f, s, t) {
  document.getElementById('totalCount').textContent = t;
  document.getElementById('passCount').textContent = p;
  document.getElementById('failCount').textContent = f;
  document.getElementById('skipCount').textContent = s;
}

function renderResults(filter = 'all') {
  const container = document.getElementById('results');
  const categories = [...new Set(results.map(r => r.category))];
  let html = '';

  for (const cat of categories) {
    const catResults = results.filter(r => r.category === cat);
    const filtered = filter === 'all' ? catResults : catResults.filter(r => filter === 'pass' ? r.pass : !r.pass);
    if (filtered.length === 0) continue;

    const catPass = catResults.filter(r => r.pass).length;
    html += `<div class="category">`;
    html += `<div class="category-header">${cat} <span class="category-count">${catPass}/${catResults.length} passed</span></div>`;
    for (const r of filtered) {
      const cls = r.pass ? 'pass' : 'fail';
      const icon = r.pass ? '✓' : '✗';
      html += `<div class="test-row ${cls}">
        <span class="status">${icon}</span>
        <span class="name">${r.name}</span>
        <span class="detail">${r.detail || ''}</span>
      </div>`;
    }
    html += `</div>`;
  }

  container.innerHTML = html;
}

function filterTests(type, btn) {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderResults(type);
}
