upstream wordpress_upstream {
  server wordpress:80;
}

server {
  listen 80;
  server_name _;

  # Security headers (baseline)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # HSTS should only be enabled when you terminate TLS at this proxy.
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # General rate limiting
  limit_req zone=global_limit burst=60 nodelay;

  # Block common sensitive endpoints (tune if you need xmlrpc)
  location = /xmlrpc.php {
    return 403;
  }

  # Limit wp-login brute force
  location = /wp-login.php {
    limit_req zone=login_limit burst=5 nodelay;
    proxy_pass http://wordpress_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://wordpress_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }
}
